<button type="button" class="js-colorlib-nav-toggle colorlib-nav-toggle" aria-label="Abrir menú" aria-controls="colorlib-aside" aria-expanded="false"><i aria-hidden="true"></i></button>
<aside id="colorlib-aside" role="complementary" class="js-fullheight text-center">
    <a href="index.html" id="colorlib-logo" class="site-logo" aria-label="Ir al inicio">{{ config.navbar.title }}<span>.</span></a>
    <nav id="colorlib-main-menu" aria-label="Navegación principal">
        <ul>
            {% for key, value in config.navbar.pages.items() %}
                {% if key == page_name %}
                    <li class="colorlib-active"><a href="{{ key }}.html" aria-current="page">{{ value }}</a></li>
                {% else %}
                    <li><a href="{{ key }}.html">{{ value }}</a></li>
                {% endif %}
            {% endfor %}
        </ul>
    </nav>

    <div class="colorlib-footer">
        <ul>
            <li><a href="https://x.com/gvarnu" aria-label="X (Twitter)" rel="me"><i class="icon-twitter" aria-hidden="true"></i></a></li>
            <li><a href="https://www.instagram.com/gvarnu/" aria-label="Instagram" rel="me"><i class="icon-instagram" aria-hidden="true"></i></a></li>
            <li><a href="https://github.com/gustavovargas" aria-label="GitHub" rel="me"><i class="icon-github" aria-hidden="true"></i></a></li>
            <li><a href="https://www.linkedin.com/in/gustavovargas2/" aria-label="LinkedIn" rel="me"><i class="icon-linkedin" aria-hidden="true"></i></a></li>
        </ul>
    </div>
</aside>
